<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#080C12" />
    <meta name="description" content="Guia clínico de referência em síndromes vestibulares para fisioterapeutas e fonoaudiólogos." />

    <!-- PWA iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vestibular Pro" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />

    <!-- PWA Android -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <title>Vestibular Pro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

        background: #080C12;

        font-family: 'DM Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;

      /* Safe area for notch/home indicator */
      #root {
        padding-top: env(safe-area-inset-top);
